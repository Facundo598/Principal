<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de Turnos</title>

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  padding: 1rem;
}

h1 {
  text-align: center;
  margin-bottom: 0.5rem;
}

/* ===== LEYENDA ===== */
.leyenda {
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
  font-size: 0.9rem;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 6px;
  font-weight: 700;
  color: #fff;
}

.badge.manana   { background: #2563eb; }
.badge.tarde    { background: #ea580c; }
.badge.noche    { background: #7c3aed; }
.badge.descanso { background: #334155; }

/* ===== CONTROLES ===== */
.controles {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}

select {
  background: #020617;
  color: #e5e7eb;
  border: 1px solid #334155;
  padding: 0.4rem 0.6rem;
  font-size: 1rem;
  border-radius: 4px;
}

/* ===== CONTENEDOR RESPONSIVE ===== */
.contenedor-calendario {
  margin: 0 auto;
  max-width: 50%;
}

/* ===== CALENDARIO ===== */
.calendario {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.dia-semana {
  text-align: center;
  font-size: 0.85rem;
  color: #94a3b8;
}

.dia {
  background: #020617;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 0.4rem;
  min-height: 110px;
  display: flex;
  flex-direction: column;
}

.numero {
  font-weight: 600;
  margin-bottom: 0.25rem;
  font-size: 0.9rem;
}

.hoy {
  outline: 3px solid #facc15;
  outline-offset: -2px;
}

.fin-semana {
  box-shadow: inset 0 0 0 2px rgba(239,68,68,0.4);
}

.turno {
  font-size: 0.75rem;
  margin-top: 2px;
  padding: 2px 4px;
  border-radius: 4px;
  text-align: center;
  font-weight: 600;
}

.manana { background: #2563eb; }
.tarde  { background: #ea580c; }
.noche  { background: #7c3aed; }
.descanso { background: #334155; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .contenedor-calendario {
    max-width: 90%;
  }

  .dia {
    min-height: 95px;
  }
}
</style>
</head>

<body>

<h1>Calendario de Turnos</h1>

<!-- LEYENDA -->
<div class="leyenda">
  <span class="badge manana">M</span> Mañana
  <span class="badge tarde">T</span> Tarde
  <span class="badge noche">N</span> Noche
  <span class="badge descanso">D</span> Descanso
</div>

<!-- SELECTORES -->
<div class="controles">
  <select id="mes"></select>
  <select id="anio"></select>
</div>

<!-- CALENDARIO -->
<div class="contenedor-calendario">
  <div class="calendario" id="calendario"></div>
</div>

<script>
// ===== CONFIGURACIÓN =====
const ciclo = [
  2,2,2,2,2,'D',
  1,1,1,1,1,'D',
  3,3,3,3,3,'D','D','D'
];

const turnos = { A:0, B:5, C:10, D:15 };
const fechaBase = new Date(2026, 0, 10); // inicio real
const hoy = new Date();

const diasSemana = ['L','M','M','J','V','S','D'];
const nombresMes = [
  'Enero','Febrero','Marzo','Abril','Mayo','Junio',
  'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'
];

// ===== FUNCIONES =====
function diffDias(fecha) {
  return Math.floor((fecha - fechaBase) / 86400000);
}

function obtenerTurno(turno, fecha) {
  const i = (diffDias(fecha) + turnos[turno]) % ciclo.length;
  return ciclo[(i + ciclo.length) % ciclo.length];
}

function clase(v) {
  if (v === 1) return 'manana';
  if (v === 2) return 'tarde';
  if (v === 3) return 'noche';
  return 'descanso';
}

// ===== SELECTORES =====
const selMes = document.getElementById('mes');
const selAnio = document.getElementById('anio');

nombresMes.forEach((m,i)=>{
  selMes.innerHTML += `<option value="${i}">${m}</option>`;
});

const anioActual = hoy.getFullYear();
for (let a = anioActual - 2; a <= anioActual + 5; a++) {
  selAnio.innerHTML += `<option value="${a}">${a}</option>`;
}

selMes.value = hoy.getMonth();
selAnio.value = anioActual;
selMes.onchange = selAnio.onchange = render;

// ===== RENDER =====
function render() {
  const mes = Number(selMes.value);
  const anio = Number(selAnio.value);
  const calendario = document.getElementById('calendario');
  calendario.innerHTML = '';

  // Encabezado días
  diasSemana.forEach(d => {
    const el = document.createElement('div');
    el.className = 'dia-semana';
    el.textContent = d;
    calendario.appendChild(el);
  });

  const primerDia = new Date(anio, mes, 1);
  const ultimoDia = new Date(anio, mes + 1, 0);

  for (let d = 1; d <= ultimoDia.getDate(); d++) {
    const fecha = new Date(anio, mes, d);

    // Espacios antes del primer día
    if (d === 1) {
      let offset = (fecha.getDay() + 6) % 7;
      for (let i = 0; i < offset; i++) {
        calendario.appendChild(document.createElement('div'));
      }
    }

    const div = document.createElement('div');
    div.className = 'dia';

    if ([0,6].includes(fecha.getDay())) div.classList.add('fin-semana');
    if (fecha.toDateString() === hoy.toDateString()) div.classList.add('hoy');

    div.innerHTML = `<div class="numero">${d}</div>`;

    for (const t in turnos) {
      const v = obtenerTurno(t, fecha);
      const span = document.createElement('div');
      span.className = `turno ${clase(v)}`;
      span.textContent = t;
      div.appendChild(span);
    }

    calendario.appendChild(div);
  }
}

render();
</script>

</body>
</html>
